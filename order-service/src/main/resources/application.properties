spring.application.name=order-service

server.port=${PORT:8083}

# Datasource Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/order_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Debu@8281}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:mySuperSecretKeyForHackathonProject123}

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
# Set to true if you run Eureka; false allows order-service to start without it


# Custom Service URL
medicine.service.url=${MEDICINE_SERVICE_URL:http://localhost:8082}

